name: Publish Docker Image

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  schema-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build database image
        run: docker build -t lekkeratlas-database:test .

      - name: Start database container
        run: |
          docker run -d \
            --name lekkeratlas-database-test \
            -e POSTGRES_DB=lekkeratlas \
            -e POSTGRES_USER=lekkeratlas \
            -e POSTGRES_PASSWORD=lekkeratlas \
            lekkeratlas-database:test

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if docker exec lekkeratlas-database-test pg_isready -U lekkeratlas -d lekkeratlas; then
              sleep 1
              exit 0
            fi

            sleep 1
          done

          docker logs lekkeratlas-database-test
          exit 1

      - name: Check schema
        run: docker exec lekkeratlas-database-test schema-sync check

      - name: Print schema diff on failure
        if: failure()
        run: |
          docker logs lekkeratlas-database-test || true
          docker exec lekkeratlas-database-test schema-sync diff || true

      - name: Stop database container
        if: always()
        run: docker rm -f lekkeratlas-database-test || true

  build-and-push:
    runs-on: ubuntu-latest
    needs: schema-check

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/lekkeratlas-database
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
